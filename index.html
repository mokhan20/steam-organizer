<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="config.js"></script>
    <style>
      body {
        background-color: #1a1a2e;
        color: rgb(255, 255, 255);
        font-family: sans-serif;
      }
      .game-card {
        background-color: #2a2a4a;
        padding: 16px;
        width: 200px;
        border-radius: 8px;
        margin: 6px;
        box-sizing: border-box;
      }
      .game-card p {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin: 4px 0;
        width: 100%;
      }
      .game-card img {
        width: 100%;
        border-radius: 4px;
        display: block;
      }
      #library {
        display: flex;
        flex-wrap: wrap;
        width: 70%;
      }
      #detail-panel {
        width: 300px;
        height: 400px;
        background-color: #2a2a4a;
        padding: 24px;
        border-radius: 8px;
        overflow: hidden;
        position: sticky;
        top: 24px;
        margin-top: 16px;
      }
      #container {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }
      #min-hours {
        width: 300px;
      }
    </style>
  </head>
  <body>
    <h1>Your steam library!</h1>
    <p>Games</p>
    <div id="filter-bar">
      <button id="filter-toggle">⚙ Filters</button>
      <div id="filter-panel" style="display: none">
        <div class="filter-section">
          <label>Min hours played</label>
          <input type="range" id="min-hours" min="0" max="1000" value="0" />
          <span id="hours-label">0</span> hrs
        </div>
        <div class="filter-section">
          <label>Last played</label>
          <select id="last-played">
            <option value="0">All time</option>
            <option value="1">Last 24 hours</option>
            <option value="7">Last week</option>
            <option value="30">Last month</option>
            <option value="365">Last year</option>
          </select>
        </div>
        <div class="filter-section">
          <label>Review score</label>
          <div id="review-filters">
            <label><input type="checkbox" value="Overwhelmingly Positive" checked /> Overwhelmingly Positive</label>
            <label><input type="checkbox" value="Very Positive" checked /> Very Positive</label>
            <label><input type="checkbox" value="Positive" checked /> Positive</label>
            <label><input type="checkbox" value="Mixed" checked /> Mixed</label>
            <label><input type="checkbox" value="Negative" checked /> Negative</label>
          </div>
        </div>
      </div>
    </div>

    <div id="container">
      <div id="library"></div>
      <div id="sidebar">
        <div class="categoryCreate">
          <label>Create Category</label>
          <input type="text" id="category-input" placeholder="Category name..." />
          <button id="create-button">Create</button>
        </div>
        <div id="category-list"></div>
        <div id="detail-panel" style="display: none">
          <p>Click a game to see details!</p>
        </div>
      </div>
    </div>

    <script>
      const library = document.getElementById("library");
      const slider = document.getElementById("min-hours");
      const hoursLabel = document.getElementById("hours-label");
      const filterToggle = document.getElementById("filter-toggle");
      const filterPanel = document.getElementById("filter-panel");
      const lastPlayedSelect = document.getElementById("last-played");
      const reviewCheckboxes = document.querySelectorAll("#review-filters input");
      const categoryInput = document.getElementById("category-input");
      const createButton = document.getElementById("create-button");
      let categories = {};
      let activeCategory = null;

      function saveCategories() {
        localStorage.setItem("vault-categories", JSON.stringify(categories));
      }

      function loadCategories() {
        const saved = localStorage.getItem("vault-categories");
        if (saved !== null) {
          categories = JSON.parse(saved);
        }
      }

      // Builds the UI for a category — called on create AND on load from localStorage
      function createCategoryUI(name) {
        const categoryList = document.getElementById("category-list");
        const section = document.createElement("div");
        section.innerHTML = `
          <button class="toggle-btn">+</button>
          <span> ${name}</span>
          <div class="category-games"></div>
        `;
        categoryList.appendChild(section);

        const toggleBtn = section.querySelector(".toggle-btn");
        const gamesList = section.querySelector(".category-games");
        gamesList.style.display = "none";

        toggleBtn.addEventListener("click", function () {
          if (gamesList.style.display === "none") {
            gamesList.style.display = "block";
            toggleBtn.textContent = "-";
          } else {
            gamesList.style.display = "none";
            toggleBtn.textContent = "+";
          }
        });

        const categoryName = section.querySelector("span");
        categoryName.addEventListener("click", function () {
          activeCategory = name;
          applyFilters();
        });
        categoryName.addEventListener("dblclick", function () {
          activeCategory = null;
          applyFilters();
        });

        section.addEventListener("dragover", function (e) {
          e.preventDefault();
        });

        section.addEventListener("drop", function (e) {
          e.preventDefault();
          const appid = e.dataTransfer.getData("text/plain");
          if (!categories[name].includes(appid)) {
            categories[name].push(appid);
            saveCategories();
            const card = document.querySelector(`[data-appid="${appid}"]`);
            const gameName = card.querySelector("p").textContent;
            const entry = document.createElement("div");
            entry.innerHTML = `
              <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/${appid}/header.jpg" width="30">
              <span>${gameName}</span>
            `;
            gamesList.appendChild(entry);
          }
        });

        // Rebuild saved game entries if loading from localStorage
        if (categories[name] && categories[name].length > 0) {
          categories[name].forEach(function (appid) {
            const entry = document.createElement("div");
            entry.innerHTML = `
              <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/${appid}/header.jpg" width="30">
              <span>${appid}</span>
            `;
            gamesList.appendChild(entry);
          });
        }
      }

      createButton.addEventListener("click", function () {
        const name = categoryInput.value;
        if (name === "") return;
        categories[name] = [];
        saveCategories();
        createCategoryUI(name);
        categoryInput.value = "";
      });

      filterToggle.addEventListener("click", function () {
        if (filterPanel.style.display === "none") {
          filterPanel.style.display = "block";
        } else {
          filterPanel.style.display = "none";
        }
      });

      function applyFilters() {
        const minHours = Number(slider.value);
        const days = Number(lastPlayedSelect.value);
        const now = Math.floor(Date.now() / 1000);
        const cutoff = now - days * 24 * 60 * 60;
        const checkedScores = Array.from(reviewCheckboxes)
          .filter((cb) => cb.checked)
          .map((cb) => cb.value);

        const cards = document.querySelectorAll(".game-card");
        cards.forEach(function (card) {
          const hoursOk = Number(card.dataset.hours) >= minHours;
          const lastPlayedOk = days === 0 || Number(card.dataset.lastPlayed) >= cutoff;
          const reviewOk = !card.dataset.reviewScore || checkedScores.includes(card.dataset.reviewScore);
          const categoryOk = activeCategory === null || categories[activeCategory].includes(card.dataset.appid);

          if (hoursOk && lastPlayedOk && reviewOk && categoryOk) {
            card.style.display = "";
          } else {
            card.style.display = "none";
          }
        });
      }

      slider.addEventListener("input", function () {
        hoursLabel.textContent = slider.value;
        applyFilters();
      });
      lastPlayedSelect.addEventListener("change", applyFilters);
      reviewCheckboxes.forEach(function (checkbox) {
        checkbox.addEventListener("change", applyFilters);
      });

      // Load saved categories and rebuild UI before loading library
      loadCategories();
      Object.keys(categories).forEach(function (name) {
        createCategoryUI(name);
      });

      async function loadLibrary() {
        const url = `https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&include_appinfo=true&include_played_free_games=true&format=json`;
        const response = await fetch(url);
        const data = await response.json();

        const games = data.response.games;
        const maxHours = Math.max(...games.map((game) => Math.round(game.playtime_forever / 60)));
        slider.max = maxHours;

        games.sort(function (a, b) {
          if (a.rtime_last_played === 0) return 1;
          if (b.rtime_last_played === 0) return -1;
          return b.rtime_last_played - a.rtime_last_played;
        });

        games.forEach(function (game) {
          const card = document.createElement("div");
          card.dataset.appid = game.appid;
          card.className = "game-card";
          card.draggable = true;
          card.addEventListener("dragstart", function (e) {
            e.dataTransfer.setData("text/plain", game.appid);
          });
          card.dataset.hours = Math.round(game.playtime_forever / 60);
          card.dataset.lastPlayed = game.rtime_last_played;

          if (game.rtime_last_played === 0 || game.playtime_forever === 0) {
            card.style.opacity = "0.4";
          }
          card.innerHTML = `
            <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg">
            <p>${game.name}</p>
            <p>${Math.round(game.playtime_forever / 60)} hrs</p>
          `;
          library.appendChild(card);

          card.addEventListener("click", async function () {
            const panel = document.getElementById("detail-panel");
            panel.style.display = "";
            panel.innerHTML = `<p>Loading...</p>`;

            const response = await fetch(`https://store.steampowered.com/api/appdetails?appids=${game.appid}&l=english`);
            const data = await response.json();
            const details = data[game.appid].data;

            panel.innerHTML = `
              <h1>${game.name}</h1>
              <p>${Math.round(game.playtime_forever / 60)} hrs</p>
              <p>Last played: ${new Date(game.rtime_last_played * 1000).toLocaleDateString()}</p>
              <p>${card.dataset.reviewScore || "No reviews"}</p>
              <p>${details?.short_description || "No description available"}</p>
            `;
          });
        });

        const reviewPromises = games.map(function (game) {
          return fetch(`https://store.steampowered.com/appreviews/${game.appid}?json=1&language=english`)
            .then((r) => r.json())
            .then((data) => ({
              appid: game.appid,
              score: data.query_summary?.review_score_desc || "No reviews",
            }));
        });

        const reviews = await Promise.all(reviewPromises);
        reviews.forEach(function (review) {
          const card = document.querySelector(`[data-appid="${review.appid}"]`);
          if (card) card.dataset.reviewScore = review.score;
        });
      }

      loadLibrary();
    </script>
  </body>
</html>
