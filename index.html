<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="config.js"></script>
    <style>
      body {
        background-color: #1a1a2e;
        color: white;
        font-family: sans-serif;
      }

      .game-card {
        background-color: #2a2a4a;
        padding: 16px;
        width: 200px;
        border-radius: 8px;
        margin: 6px;
        box-sizing: border-box;
      }
      .game-card p {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin: 4px 0;
        width: 100%;
      }
      .game-card img {
        width: 100%;
        border-radius: 4px;
        display: block;
      }
      #library {
        display: flex;
        flex-wrap: wrap;
        width: 70%;
      }
      #detail-panel {
        width: 300px;
        height: 400px;
        background-color: #2a2a4a;
        padding: 24px;
        border-radius: 8px;
        overflow: hidden;
      }
      #container {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }
      #min-hours {
        width: 300px;
      }
    </style>
  </head>
  <body>
    <h1>My Steam Library</h1>
    <p>Games will go here.</p>
    <div id="filter-bar">
      <button id="filter-toggle">⚙ Filters</button>
      <div id="filter-panel" style="display: none">
        <div class="filter-section">
          <label>Min hours played</label>
          <input type="range" id="min-hours" min="0" max="1000" value="0" />
          <span id="hours-label">0</span> hrs
        </div>
        <div class="filter-section">
          <label>Last played</label>
          <select id="last-played">
            <option value="0">All time</option>
            <option value="1">Last 24 hours</option>
            <option value="7">Last week</option>
            <option value="30">Last month</option>
            <option value="365">Last year</option>
          </select>
        </div>
        <div class="filter-section">
          <label>Review score</label>
          <div id="review-filters">
            <label
              ><input type="checkbox" value="Overwhelmingly Positive" checked />
              Overwhelmingly Positive</label
            >
            <label
              ><input type="checkbox" value="Very Positive" checked /> Very
              Positive</label
            >
            <label
              ><input type="checkbox" value="Positive" checked />
              Positive</label
            >
            <label><input type="checkbox" value="Mixed" checked /> Mixed</label>
            <label
              ><input type="checkbox" value="Negative" checked />
              Negative</label
            >
          </div>
        </div>
      </div>
    </div>
    <div id="container">
      <div id="library"></div>
      <div id="detail-panel">
        <p>Click a game to see details!</p>
      </div>
    </div>
    <script>
      const library = document.getElementById("library");

      const slider = document.getElementById("min-hours");
      const hoursLabel = document.getElementById("hours-label");
      const filterToggle = document.getElementById("filter-toggle");
      const filterPanel = document.getElementById("filter-panel");

      // Toggle filter panel
      filterToggle.addEventListener("click", function () {
        if (filterPanel.style.display === "none") {
          filterPanel.style.display = "block";
        } else {
          filterPanel.style.display = "none";
        }
      });

      // Hours slider
      slider.addEventListener("input", function () {
        hoursLabel.textContent = slider.value;
        const minHours = slider.value;
        const cards = document.querySelectorAll(".game-card");
        cards.forEach(function (card) {
          if (Number(card.dataset.hours) < Number(minHours)) {
            card.style.display = "none";
          } else {
            card.style.display = "";
          }
        });
      });
      const lastPlayedSelect = document.getElementById("last-played");

      lastPlayedSelect.addEventListener("change", function () {
        const days = Number(lastPlayedSelect.value);
        const now = Math.floor(Date.now() / 1000); // current time in Unix seconds
        const cutoff = now - days * 24 * 60 * 60; // X days ago in Unix seconds

        const cards = document.querySelectorAll(".game-card");
        cards.forEach(function (card) {
          if (days === 0) {
            card.style.display = ""; // 0 = All time, show everything
            return;
          }
          if (Number(card.dataset.lastPlayed) < cutoff) {
            card.style.display = "none";
          } else {
            card.style.display = "";
          }
        });
      });

      async function loadLibrary() {
        const url = `https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&include_appinfo=true&include_played_free_games=true&format=json`;
        const response = await fetch(url);
        const data = await response.json();

        const games = data.response.games;
        const maxHours = Math.max(
          ...games.map((game) => Math.round(game.playtime_forever / 60)),
        );
        slider.max = maxHours;

        games.sort(function (a, b) {
          if (a.rtime_last_played === 0) return 1; // In JS if positive that means B goes ontop
          if (b.rtime_last_played === 0) return -1;
          return b.rtime_last_played - a.rtime_last_played;
        });
        games.forEach(function (game) {
          const card = document.createElement("div");
          card.className = "game-card";
          card.dataset.hours = Math.round(game.playtime_forever / 60);
          card.dataset.lastPlayed = game.rtime_last_played;

          if (game.rtime_last_played === 0 || game.playtime_forever === 0) {
            card.style.opacity = "0.4";
          }
          card.innerHTML = `
          <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg">
          <p> ${game.name}</p>
          <p> ${Math.round(game.playtime_forever / 60)} hrs </p>
          `;
          library.appendChild(card);
          card.addEventListener("click", function () {
            const click = document.getElementById("detail-panel");
            click.innerHTML = `
            <h1> ${game.name}</h1>
            <p> ${Math.round(game.playtime_forever / 60)} hrs </p>
            <p>Last played: ${new Date(game.rtime_last_played * 1000).toLocaleDateString()}</p>

              `;
          });
        });
      }
      loadLibrary();
    </script>
  </body>
</html>
